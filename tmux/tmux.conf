# Portable tmux config for local macOS and remote Linux hosts.
# Intended to be symlinked to ~/.tmux.conf from this repo.

##### Terminal #####

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -g xterm-keys on
set -sg escape-time 10
set -g focus-events on

##### Behavior #####

set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename off
set -g set-clipboard on

##### OS Detection #####

if-shell 'uname | grep -qi darwin' "set-environment -g TMUX_OS macos"
if-shell 'uname | grep -qi linux' "set-environment -g TMUX_OS linux"

##### Splits And Windows #####

unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind -r m resize-pane -Z

bind j resize-pane -D 5
bind k resize-pane -U 5
bind h resize-pane -L 5
bind l resize-pane -R 5

##### Session Helpers #####

bind-key -n M-c attach-session -c "#{pane_current_path}"

##### Copy Mode #####

bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
bind -T copy-mode-vi WheelUpPane   select-pane \; send-keys -X -N 5 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 5 scroll-down

##### Vim / Tmux Navigation #####

set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_prev "C-\\"
set -g @vim_navigator_disable_when_zoomed 1

##### Status Line #####

set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-left-length 80
set -g status-right-length 120
set -g status-style "bg=#111827,fg=#cbd5e1"
set -g message-style "bg=#1d4ed8,fg=#eff6ff"
set -g mode-style "bg=#f59e0b,fg=#111827,bold"
set -g pane-border-style "fg=#334155"
set -g pane-active-border-style "fg=#60a5fa"
set -g window-status-style "fg=#94a3b8,bg=#111827"
set -g window-status-current-style "fg=#111827,bg=#93c5fd,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
set -g status-left "#[fg=#0f172a,bg=#93c5fd,bold] TMUX #[fg=#cbd5e1,bg=#1e293b] #S "
set -g status-right "#{?client_prefix,#[fg=#111827,bg=#f59e0b,bold] PREFIX ,}#[fg=#cbd5e1,bg=#1e293b] #(whoami)@#H #[fg=#cbd5e1,bg=#0f172a] #{pane_current_path} #[fg=#0f172a,bg=#60a5fa,bold] %Y-%m-%d %H:%M "

##### Plugins #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @yank_selection_mouse 'clipboard'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

##### OS-Specific Clipboard #####

if-shell -F '#{==:#{TMUX_OS},macos}' "set -g @override_copy_command 'pbcopy'"
if-shell -F '#{==:#{TMUX_OS},linux}' "if-shell 'command -v wl-copy >/dev/null 2>&1' \"set -g @override_copy_command 'wl-copy'\""
if-shell -F '#{==:#{TMUX_OS},linux}' "if-shell 'command -v xclip >/dev/null 2>&1' \"set -g @override_copy_command 'xclip -selection clipboard -in'\""
if-shell -F '#{==:#{TMUX_OS},linux}' "if-shell 'command -v xsel >/dev/null 2>&1' \"set -g @override_copy_command 'xsel --clipboard --input'\""

##### Shell Defaults #####

# Use a custom ZDOTDIR so zsh sources our wrapper .zshrc (which sources the
# real one, then overrides 'clear' to avoid erasing tmux scrollback).
# For bash on Linux, use --init-file for the same effect.
if-shell 'echo "$SHELL" | grep -q zsh' \
  'set -g default-command "ZDOTDIR=$HOME/.config/nvim/tmux/zsh zsh -l"' \
  'set -g default-command "bash --init-file $HOME/.config/nvim/tmux/bash/bashrc -l"'

##### TPM #####

run '~/.tmux/plugins/tpm/tpm'

##### Key Override (after TPM so we win over vim-tmux-navigator) #####

